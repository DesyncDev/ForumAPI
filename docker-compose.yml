services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_forumdb
    environment:
      POSTGRES_DB: forumapi_db
      POSTGRES_USER: uforum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: